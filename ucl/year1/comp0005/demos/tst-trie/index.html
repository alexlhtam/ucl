<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TST / 3-way trie demo — COMP0005</title>
  <style>
    :root { font-family: system-ui, sans-serif; }
    body { margin: 0; padding: 12px 16px; max-width: 1100px; }
    h1 { font-size: 1.15rem; margin: 0 0 8px; }
    .back { font-size: 0.9rem; margin-bottom: 12px; }
    .back a { color: #3949ab; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
    input[type="text"] { width: 10rem; padding: 6px 8px; }
    button { padding: 6px 12px; cursor: pointer; }
    #svg-wrap { border: 1px solid #ccc; border-radius: 6px; background: #fff; overflow: auto; }
    svg { display: block; }
    pre { margin: 8px 0 0; padding: 10px; background: #f5f5f5; border-radius: 6px; font-size: 12px;
          white-space: pre-wrap; max-height: 120px; overflow: auto; }
    .hint { color: #555; font-size: 13px; margin-top: 8px; }
    .err { color: #b00020; margin-top: 6px; }
    .key { font-size: 11px; fill: #666; }
  </style>
</head>
<body>
  <p class="back"><a href="../../cursor-notes/15-tries-and-string-search/">← Tries &amp; String Search (notes)</a></p>
  <h1>Ternary search trie (3-way trie)</h1>
  <p class="hint">Lowercase <strong>a–z</strong> keys. Matches scratch <code>three-way-trie.py</code>. <strong>Blue</strong> edges = mid (equal char, next level); <strong>gray</strong> = left/right.</p>
  <div class="row">
    <label>Key <input type="text" id="key" placeholder="e.g. shells" maxlength="32"/></label>
    <label>Value <input type="text" id="val" placeholder="e.g. 7" maxlength="16"/></label>
    <button type="button" id="btn-put">Put</button>
    <button type="button" id="btn-get">Get</button>
    <button type="button" id="btn-clear">Clear</button>
  </div>
  <div id="err" class="err" aria-live="polite"></div>
  <div id="svg-wrap"><svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <pre id="out"></pre>
<script>
(function () {
  'use strict';
  function idxOk(c) {
    const code = c.charCodeAt(0) - 97;
    if (code < 0 || code >= 26) throw new Error('use a–z only');
  }
  function validKey(s) {
    s = String(s).trim().toLowerCase();
    if (!s) throw new Error('empty key');
    for (let i = 0; i < s.length; i++) idxOk(s[i]);
    return s;
  }

  class TSTNode {
    constructor(ch) {
      this.char = ch;
      this.left = this.mid = this.right = null;
      this.value = null;
    }
  }

  class TST {
    constructor() { this.root = null; }
    put(key, value) {
      this.root = this._put(this.root, key, value, 0);
    }
    _put(node, key, val, d) {
      const char = key[d];
      if (node === null) node = new TSTNode(char);
      if (char < node.char) node.left = this._put(node.left, key, val, d);
      else if (char > node.char) node.right = this._put(node.right, key, val, d);
      else if (d < key.length - 1) node.mid = this._put(node.mid, key, val, d + 1);
      else node.value = val;
      return node;
    }
    get(key) {
      const n = this._get(this.root, key, 0);
      return n === null ? undefined : n.value;
    }
    _get(node, key, d) {
      if (node === null) return null;
      const char = key[d];
      if (char < node.char) return this._get(node.left, key, d);
      if (char > node.char) return this._get(node.right, key, d);
      if (d < key.length - 1) return this._get(node.mid, key, d + 1);
      return node;
    }
  }

  const tst = new TST();
  const NODE_R = 18;
  const DX = 56;
  const DY_MID = 64;
  const DY_LR = 48;

  function layout(node, x, y, pos) {
    if (!node) return { minX: x, maxX: x };
    pos.set(node, { x, y, ch: node.char, val: node.value });
    let minX = x - NODE_R;
    let maxX = x + NODE_R;
    if (node.left) {
      const sub = layout(node.left, x - DX, y + DY_LR, pos);
      minX = Math.min(minX, sub.minX);
      maxX = Math.max(maxX, sub.maxX);
    }
    if (node.right) {
      const sub = layout(node.right, x + DX, y + DY_LR, pos);
      minX = Math.min(minX, sub.minX);
      maxX = Math.max(maxX, sub.maxX);
    }
    if (node.mid) {
      const sub = layout(node.mid, x, y + DY_MID, pos);
      minX = Math.min(minX, sub.minX);
      maxX = Math.max(maxX, sub.maxX);
    }
    return { minX, maxX };
  }

  function collectEdges(node, pos, edges) {
    if (!node) return;
    const p = pos.get(node);
    if (node.left) {
      const c = pos.get(node.left);
      edges.push({ x1: p.x, y1: p.y + NODE_R, x2: c.x, y2: c.y - NODE_R, kind: 'L' });
      collectEdges(node.left, pos, edges);
    }
    if (node.right) {
      const c = pos.get(node.right);
      edges.push({ x1: p.x, y1: p.y + NODE_R, x2: c.x, y2: c.y - NODE_R, kind: 'R' });
      collectEdges(node.right, pos, edges);
    }
    if (node.mid) {
      const c = pos.get(node.mid);
      edges.push({ x1: p.x, y1: p.y + NODE_R, x2: c.x, y2: c.y - NODE_R, kind: 'M' });
      collectEdges(node.mid, pos, edges);
    }
  }

  function buildDiagram() {
    const pos = new Map();
    if (!tst.root) return { empty: true, width: 400, height: 160 };
    const b = layout(tst.root, 400, 40, pos);
    let minY = Infinity, maxY = -Infinity;
    pos.forEach((p) => {
      minY = Math.min(minY, p.y - NODE_R);
      maxY = Math.max(maxY, p.y + NODE_R);
    });
    const pad = 40;
    const offX = pad - b.minX;
    const offY = pad - minY;
    const edges = [];
    collectEdges(tst.root, pos, edges);
    const edges2 = edges.map((e) => ({
      x1: e.x1 + offX, y1: e.y1 + offY, x2: e.x2 + offX, y2: e.y2 + offY, kind: e.kind,
    }));
    const nodes = [];
    pos.forEach((p) => {
      nodes.push({
        x: p.x + offX, y: p.y + offY, r: NODE_R,
        ch: p.ch, sub: p.val !== null && p.val !== undefined ? String(p.val) : '',
      });
    });
    const width = b.maxX - b.minX + 2 * pad;
    const height = maxY - minY + 2 * pad + 24;
    return { empty: false, width, height, edges: edges2, nodes };
  }

  function render() {
    const d = buildDiagram();
    const svg = document.getElementById('diagram');
    svg.innerHTML = '';
    if (d.empty) {
      svg.setAttribute('viewBox', '0 0 400 160');
      const t = document.createElementNS(svg.namespaceURI, 'text');
      t.setAttribute('x', '16'); t.setAttribute('y', '28');
      t.setAttribute('fill', '#666');
      t.textContent = '(empty TST)';
      svg.appendChild(t);
      return;
    }
    svg.setAttribute('viewBox', '0 0 ' + d.width + ' ' + d.height);
    d.edges.forEach((e) => {
      const line = document.createElementNS(svg.namespaceURI, 'line');
      line.setAttribute('x1', e.x1); line.setAttribute('y1', e.y1);
      line.setAttribute('x2', e.x2); line.setAttribute('y2', e.y2);
      const blue = e.kind === 'M';
      line.setAttribute('stroke', blue ? '#1565c0' : '#9e9e9e');
      line.setAttribute('stroke-width', blue ? '2.5' : '1.5');
      svg.appendChild(line);
      const lb = document.createElementNS(svg.namespaceURI, 'text');
      lb.setAttribute('class', 'key');
      lb.setAttribute('x', (e.x1 + e.x2) / 2);
      lb.setAttribute('y', (e.y1 + e.y2) / 2 - 4);
      lb.setAttribute('text-anchor', 'middle');
      lb.setAttribute('font-size', '10');
      lb.setAttribute('fill', blue ? '#0d47a1' : '#757575');
      lb.textContent = e.kind === 'M' ? 'mid' : e.kind === 'L' ? 'L' : 'R';
      svg.appendChild(lb);
    });
    d.nodes.forEach((n) => {
      const c = document.createElementNS(svg.namespaceURI, 'circle');
      c.setAttribute('cx', n.x); c.setAttribute('cy', n.y); c.setAttribute('r', n.r);
      c.setAttribute('fill', '#fff8e1'); c.setAttribute('stroke', '#333'); c.setAttribute('stroke-width', '2');
      svg.appendChild(c);
      const t1 = document.createElementNS(svg.namespaceURI, 'text');
      t1.setAttribute('x', n.x); t1.setAttribute('y', n.y - 2);
      t1.setAttribute('text-anchor', 'middle'); t1.setAttribute('font-size', '13');
      t1.setAttribute('font-weight', 'bold'); t1.setAttribute('font-family', 'Menlo, monospace');
      t1.textContent = n.ch;
      svg.appendChild(t1);
      const t2 = document.createElementNS(svg.namespaceURI, 'text');
      t2.setAttribute('x', n.x); t2.setAttribute('y', n.y + 10);
      t2.setAttribute('text-anchor', 'middle'); t2.setAttribute('font-size', '9');
      t2.setAttribute('font-family', 'Menlo, monospace');
      t2.textContent = n.sub || '·';
      svg.appendChild(t2);
    });
  }

  document.getElementById('btn-put').onclick = function () {
    document.getElementById('err').textContent = '';
    try {
      const k = validKey(document.getElementById('key').value);
      const v = document.getElementById('val').value.trim();
      if (!v) throw new Error('empty value');
      tst.put(k, v);
      document.getElementById('out').textContent = 'put(' + JSON.stringify(k) + ', ' + JSON.stringify(v) + ')';
      render();
    } catch (e) {
      document.getElementById('err').textContent = e.message || String(e);
    }
  };

  document.getElementById('btn-get').onclick = function () {
    document.getElementById('err').textContent = '';
    try {
      const k = validKey(document.getElementById('key').value);
      const v = tst.get(k);
      document.getElementById('out').textContent =
        v === undefined ? 'get(' + JSON.stringify(k) + ') → miss' : 'get(' + JSON.stringify(k) + ') → ' + JSON.stringify(v);
    } catch (e) {
      document.getElementById('err').textContent = e.message || String(e);
    }
  };

  document.getElementById('btn-clear').onclick = function () {
    tst.root = null;
    document.getElementById('out').textContent = 'cleared';
    render();
  };

  render();
})();
</script>
</body>
</html>
