site_name: Alex's UCL Notes
site_description: Year 1 Computer Science notes — UCL
site_author: Alex Tam
site_url: https://alexlhtam.github.io/ucl/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs          # top-level sections as tabs
    - navigation.tabs.sticky   # tabs stay visible when scrolling
    - navigation.sections      # expand sections in sidebar
    - navigation.top           # back-to-top button
    - navigation.indexes       # section index pages
    - search.highlight         # highlight search terms in results
    - search.suggest           # autocomplete suggestions
    - content.code.copy        # copy button on code blocks
    - content.tooltips
  icon:
    logo: material/book-open-variant

# -----------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------
plugins:
  - search
  - glightbox                  # click-to-zoom on images

# -----------------------------------------------------------------
# Markdown extensions
# -----------------------------------------------------------------
markdown_extensions:
  - pymdownx.arithmatex:       # LaTeX math rendering
      generic: true
  - pymdownx.highlight:        # syntax highlighting
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences       # code blocks inside lists etc.
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details           # collapsible sections
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition                 # note/warning/tip boxes
  - tables
  - toc:
      permalink: true

# MathJax for LaTeX rendering
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

# -----------------------------------------------------------------
# Site structure — only files listed here are published.
# Comment out any section you don't want to appear yet.
# Add new files by adding lines in the same format.
# -----------------------------------------------------------------
docs_dir: ucl

